<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ovees Eleganza Admin - Login</title>
  <link rel="stylesheet" href="/static/css/admin.css">
  <link rel="stylesheet" href="/static/css/admin_responsive.css?v=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1>
      <i class="fas fa-gem"></i>
      Ovees Eleganza
    </h1>
    <p class="muted">Premium Jewelry Admin Dashboard</p>
    <p class="muted small">Manage products, categories, banners, combos and new arrivals</p>

    <form id="loginForm">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" name="username" required placeholder="Enter your username" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" name="password" required placeholder="Enter your password" />
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-sign-in-alt"></i> Sign in
      </button>
    </form>

    <p class="muted small mt-3">No registration from UI — use server seed or create admin via API.</p>
  </main>

  <script src="/static/js/admin_auth.js"></script>
</body>
</html>
